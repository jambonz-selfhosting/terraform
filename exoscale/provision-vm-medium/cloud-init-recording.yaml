#cloud-config
# Cloud-init for Jambonz Recording Server on Exoscale

# Merge SSH keys into existing jambonz user
users:
  - name: jambonz
    ssh_authorized_keys:
      - "${ssh_public_key}"

write_files:
  - path: /tmp/configure-recording.sh
    permissions: '0755'
    content: |
      #!/bin/bash -xe
      # Configuration script for jambonz Recording Server

      # Variables from Terraform
      MYSQL_HOST="${mysql_host}"
      MYSQL_PORT="${mysql_port}"
      MYSQL_USER="${mysql_user}"
      MYSQL_PASSWORD="${mysql_password}"
      MYSQL_DATABASE="${mysql_database}"
      JWT_SECRET="${jwt_secret}"
      WEB_MONITORING_PRIVATE_IP="${web_monitoring_private_ip}"

      echo "Starting jambonz Recording Server configuration for Exoscale"

      # Stop services immediately — they were auto-started at boot before eth1 is up
      # and before configuration is written. We restart each one later in this script
      # after eth1 is up and the config has been applied.
      sudo systemctl stop telegraf || true

      USER=jambonz
      HOME=/home/jambonz

      # Bring up private network interface
      # The cloud-init network: stanza is overridden by the Exoscale datasource,
      # so we must bring up eth1 explicitly via DHCP.
      # Wait for the device to appear (udev may not have registered it yet at runcmd time).
      echo "Bringing up private network interface (eth1)..."
      for i in $(seq 1 30); do
        if ip link show eth1 &>/dev/null; then
          sudo dhclient eth1 && break
        fi
        echo "Waiting for eth1 to appear (attempt $i)..."
        sleep 2
      done

      # Get instance metadata
      echo "Getting instance metadata..."
      INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || hostname)

      echo "Instance ID: $INSTANCE_ID"

      # Configure upload_recordings service
      echo "Configuring upload_recordings service"
      sudo sed -i -e "s/MYSQL_HOST=/MYSQL_HOST=$MYSQL_HOST/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/MYSQL_USER=/MYSQL_USER=$MYSQL_USER/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/MYSQL_PASSWORD=/MYSQL_PASSWORD=$MYSQL_PASSWORD/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/MYSQL_DATABASE=/MYSQL_DATABASE=$MYSQL_DATABASE/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/BASIC_AUTH_USERNAME=/BASIC_AUTH_USERNAME=jambonz/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/BASIC_AUTH_PASSWORD=/BASIC_AUTH_PASSWORD=$JWT_SECRET/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/ENCRYPTION_SECRET=/ENCRYPTION_SECRET=$JWT_SECRET/g" /etc/systemd/system/upload_recordings.service
      sudo sed -i -e "s/--port 3017/--port 3000/g" /etc/systemd/system/upload_recordings.service

      # Insert the LD_LIBRARY_PATH environment variable into the [Service] section
      sudo sed -i '/\[Service\]/a Environment=LD_LIBRARY_PATH=\/usr\/local\/lib' /etc/systemd/system/upload_recordings.service

      sudo systemctl daemon-reload
      sudo systemctl enable upload_recordings
      sudo systemctl start upload_recordings

      # Configure telegraf to send to the monitoring server
      sudo sed -i -e "s/influxdb:8086/$WEB_MONITORING_PRIVATE_IP:8086/g" /etc/telegraf/telegraf.conf

      # Wait for InfluxDB to be ready on the monitoring server
      echo "Waiting for InfluxDB at $WEB_MONITORING_PRIVATE_IP:8086..."
      for i in $(seq 1 60); do
          if curl -sf http://$WEB_MONITORING_PRIVATE_IP:8086/ping &>/dev/null; then
              echo "InfluxDB is available"
              break
          fi
          echo "InfluxDB not yet available, attempt $i/60..."
          sleep 10
      done
      sudo systemctl restart telegraf

      echo "Recording Server setup complete!"

runcmd:
  - /tmp/configure-recording.sh > /var/log/jambonz-setup.log 2>&1

final_message: "jambonz Recording Server cloud-init configuration complete after $UPTIME seconds"