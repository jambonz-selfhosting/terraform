#cloud-config
# Cloud-init for Jambonz Monitoring Server on Exoscale (Large deployment)
# Handles Grafana, Homer, Jaeger, InfluxDB, Cassandra, HEPlify

# Merge SSH keys into existing jambonz user
users:
  - name: jambonz
    ssh_authorized_keys:
      - "${ssh_public_key}"

write_files:
  - path: /tmp/configure-monitoring.sh
    permissions: '0755'
    content: |
      #!/bin/bash -xe
      # Configuration script for jambonz Monitoring server

      # Variables from Terraform
      URL_PORTAL="${url_portal}"
      VPC_CIDR="${vpc_cidr}"
      ENABLE_OTEL="${enable_otel}"
      ENABLE_PCAPS="${enable_pcaps}"

      echo "Starting jambonz Monitoring server configuration for Exoscale"

      # Stop services immediately — they were auto-started at boot before eth1 is up
      # and before configuration is written. We restart each one later in this script
      # after eth1 is up and the config has been applied.
      sudo systemctl stop telegraf || true

      USER=jambonz
      HOME=/home/jambonz

      # Bring up private network interface
      # The cloud-init network: stanza is overridden by the Exoscale datasource,
      # so we must bring up eth1 explicitly via DHCP.
      # Wait for the device to appear (udev may not have registered it yet at runcmd time).
      echo "Bringing up private network interface (eth1)..."
      for i in $(seq 1 30); do
        if ip link show eth1 &>/dev/null; then
          sudo dhclient eth1 && break
        fi
        echo "Waiting for eth1 to appear (attempt $i)..."
        sleep 2
      done

      # Get instance metadata
      echo "Getting instance metadata..."
      PRIVATE_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' || echo "172.20.0.1")
      INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || hostname)
      PUBLIC_IP=$(curl -s https://api.ipify.org)

      echo "Public IP: $PUBLIC_IP"
      echo "Private IP: $PRIVATE_IP (eth1)"
      echo "Instance ID: $INSTANCE_ID"

      # Configure telegraf to send locally (this IS the monitoring server)
      sudo sed -i -e "s/influxdb:8086/127.0.0.1:8086/g" /etc/telegraf/telegraf.conf
      sudo systemctl restart telegraf

      # HEPlify server (receives HEP packets from SIP/RTP servers)
      if [[ "$ENABLE_PCAPS" == "true" ]]; then
        echo "PCAP capture enabled — starting heplify-server..."
        sudo systemctl restart heplify-server.service || true
      else
        echo "PCAP capture disabled — stopping heplify-server..."
        sudo systemctl stop heplify-server.service || true
        sudo systemctl disable heplify-server.service || true
      fi

      # OTEL tracing (Cassandra + Jaeger)
      if [[ "$ENABLE_OTEL" == "true" ]]; then
        echo "OTEL tracing enabled — starting Cassandra and Jaeger..."
        sudo systemctl restart cassandra.service || true
        sleep 60
        sudo systemctl restart jaeger-collector.service || true
        sudo systemctl restart jaeger-query.service || true
      else
        echo "OTEL tracing disabled — stopping Cassandra and Jaeger..."
        sudo systemctl stop cassandra.service || true
        sudo systemctl stop jaeger-collector.service || true
        sudo systemctl stop jaeger-query.service || true
        sudo systemctl disable cassandra.service || true
        sudo systemctl disable jaeger-collector.service || true
        sudo systemctl disable jaeger-query.service || true
      fi

      echo "Monitoring server configuration complete!"

runcmd:
  - /tmp/configure-monitoring.sh

final_message: "Jambonz Monitoring server is ready!"
