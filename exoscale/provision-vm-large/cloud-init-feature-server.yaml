#cloud-config
# Cloud-init for Jambonz Feature Server on Exoscale (Large deployment)

# Merge SSH keys into existing jambonz user
users:
  - name: jambonz
    ssh_authorized_keys:
      - "${ssh_public_key}"

write_files:
  - path: /tmp/configure-feature-server.sh
    permissions: '0755'
    content: |
      #!/bin/bash -xe
      # Configuration script for jambonz Feature Server

      # Variables from Terraform
      MYSQL_HOST="${mysql_host}"
      MYSQL_PORT="${mysql_port}"
      MYSQL_USER="${mysql_user}"
      MYSQL_PASSWORD="${mysql_password}"
      MYSQL_DATABASE="${mysql_database}"
      REDIS_HOST="${redis_host}"
      REDIS_PORT="${redis_port}"
      JWT_SECRET="${jwt_secret}"
      MONITORING_PRIVATE_IP="${monitoring_private_ip}"
      VPC_CIDR="${vpc_cidr}"
      URL_PORTAL="${url_portal}"
      RECORDING_WS_BASE_URL="${recording_ws_base_url}"

      echo "Starting jambonz Feature Server configuration for Exoscale"

      # Stop services immediately — they were auto-started at boot before eth1 is up
      # and before configuration is written. We restart each one later in this script
      # after eth1 is up and the config has been applied.
      sudo systemctl stop telegraf || true
      sudo systemctl stop drachtio || true
      sudo systemctl stop freeswitch || true

      USER=jambonz
      HOME=/home/jambonz

      # Bring up private network interface
      # The cloud-init network: stanza is overridden by the Exoscale datasource,
      # so we must bring up eth1 explicitly via DHCP.
      # Wait for the device to appear (udev may not have registered it yet at runcmd time).
      echo "Bringing up private network interface (eth1)..."
      for i in $(seq 1 30); do
        if ip link show eth1 &>/dev/null; then
          sudo dhclient eth1 && break
        fi
        echo "Waiting for eth1 to appear (attempt $i)..."
        sleep 2
      done

      # Get instance metadata
      echo "Getting instance metadata..."
      # Get private IP from eth1 (private network interface)
      PRIVATE_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' || echo "172.20.0.1")
      INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || hostname)

      echo "Private IP: $PRIVATE_IP (eth1)"
      echo "Instance ID: $INSTANCE_ID"

      # Wait for Redis to be ready
      echo "Waiting for Redis at $REDIS_HOST:$REDIS_PORT..."
      for i in $(seq 1 60); do
          if redis-cli -h $REDIS_HOST -p $REDIS_PORT ping 2>/dev/null | grep -q PONG; then
              echo "Redis is available"
              break
          fi
          echo "Redis not yet available, attempt $i/60..."
          sleep 10
      done

      echo "Writing $HOME/apps/ecosystem.config.js..."

      cat << EOF > $HOME/apps/ecosystem.config.js
      module.exports = {
      apps : [
      {
          name: 'feature-server',
          cwd: '$HOME/apps/feature-server',
          script: 'app.js',
          instance_var: 'INSTANCE_ID',
          out_file: '$HOME/.pm2/logs/feature-server.log',
          err_file: '$HOME/.pm2/logs/feature-server.log',
          exec_mode: 'fork',
          instances: 'max',
          autorestart: true,
          watch: false,
          max_memory_restart: '5G',
          env: {
            JAMBONES_LOGLEVEL: 'info',
            JAMBONES_TTS_TRIM_SILENCE: 1,
            JWT_SECRET: '$JWT_SECRET',
            JAMBONES_API_BASE_URL: 'http://$URL_PORTAL/v1',
            ENABLE_METRICS: 1,
            STATS_HOST: '127.0.0.1',
            STATS_PORT: 8125,
            STATS_PROTOCOL: 'tcp',
            STATS_TELEGRAF: 1,
            STATS_SAMPLE_RATE: 1,
            JAMBONES_OTEL_ENABLED: 1,
            OTEL_EXPORTER_JAEGER_ENDPOINT: 'http://$MONITORING_PRIVATE_IP:14268/api/traces',
            OTEL_EXPORTER_OTLP_METRICS_INSECURE: 1,
            OTEL_EXPORTER_JAEGER_GRPC_INSECURE: 1,
            JAMBONES_NETWORK_CIDR: '$VPC_CIDR',
            JAMBONES_MYSQL_HOST: '$MYSQL_HOST',
            JAMBONES_MYSQL_PORT: $MYSQL_PORT,
            JAMBONES_MYSQL_USER: '$MYSQL_USER',
            JAMBONES_MYSQL_PASSWORD: '$MYSQL_PASSWORD',
            JAMBONES_MYSQL_DATABASE: '$MYSQL_DATABASE',
            JAMBONES_MYSQL_CONNECTION_LIMIT: 10,
            JAMBONES_REDIS_HOST: '$REDIS_HOST',
            JAMBONES_REDIS_PORT: $REDIS_PORT,

            JAMBONES_TIME_SERIES_HOST: '$MONITORING_PRIVATE_IP',
            HTTP_PORT: 3000,
            HTTP_PORT_MAX: 3009,
            DRACHTIO_HOST: '127.0.0.1',
            DRACHTIO_PORT: 9022,
            DRACHTIO_SECRET: 'cymru',
            JAMBONES_FEATURE_SERVERS: '127.0.0.1:9022:cymru',
            JAMBONES_FREESWITCH: '127.0.0.1:8021:JambonzR0ck\$',
            AUTHENTICATION_KEY: '$JWT_SECRET',
            JAMBONZ_RECORD_WS_USERNAME: 'jambonz',
            JAMBONZ_RECORD_WS_PASSWORD: '$JWT_SECRET',
            JAMBONZ_RECORD_WS_BASE_URL: '$RECORDING_WS_BASE_URL'
          }
        }]
      };
      EOF

      echo "Finished writing config file"

      # Configure freeswitch service
      sudo sed -i -e "s/JAMBONES_MYSQL_HOST=/JAMBONES_MYSQL_HOST=$MYSQL_HOST/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_MYSQL_PORT=/JAMBONES_MYSQL_PORT=$MYSQL_PORT/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_MYSQL_USER=/JAMBONES_MYSQL_USER=$MYSQL_USER/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_MYSQL_PASSWORD=/JAMBONES_MYSQL_PASSWORD=$MYSQL_PASSWORD/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_MYSQL_DATABASE=/JAMBONES_MYSQL_DATABASE=$MYSQL_DATABASE/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_REDIS_HOST=/JAMBONES_REDIS_HOST=$REDIS_HOST/g" /etc/systemd/system/freeswitch.service
      sudo sed -i -e "s/JAMBONES_REDIS_PORT=/JAMBONES_REDIS_PORT=$REDIS_PORT/g" /etc/systemd/system/freeswitch.service

      sudo systemctl daemon-reload
      sudo systemctl restart drachtio
      sudo systemctl restart freeswitch

      # Configure telegraf to send to the monitoring server
      sudo sed -i -e "s/influxdb:8086/$MONITORING_PRIVATE_IP:8086/g" /etc/telegraf/telegraf.conf

      # Wait for InfluxDB to be ready on the monitoring server
      echo "Waiting for InfluxDB at $MONITORING_PRIVATE_IP:8086..."
      for i in $(seq 1 60); do
          if curl -sf http://$MONITORING_PRIVATE_IP:8086/ping &>/dev/null; then
              echo "InfluxDB is available"
              break
          fi
          echo "InfluxDB not yet available, attempt $i/60..."
          sleep 10
      done
      sudo systemctl restart telegraf

      sudo -u $USER bash -c "pm2 start $HOME/apps/ecosystem.config.js"
      sudo env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u $USER --hp $HOME
      sudo -u $USER bash -c "pm2 save"
      sudo systemctl enable pm2-$USER.service

      echo "Feature Server setup complete!"

runcmd:
  - /tmp/configure-feature-server.sh > /var/log/jambonz-setup.log 2>&1

final_message: "jambonz Feature Server cloud-init configuration complete after $UPTIME seconds"
