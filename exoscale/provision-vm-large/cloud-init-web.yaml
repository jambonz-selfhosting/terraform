#cloud-config
# Cloud-init for Jambonz Web Server on Exoscale (Large deployment)
# Handles API server, webapp, public-apps, nginx (proxies Grafana/Homer to monitoring)

# Merge SSH keys into existing jambonz user
users:
  - name: jambonz
    ssh_authorized_keys:
      - "${ssh_public_key}"

# Configure network interfaces (both public and private)
network:
  version: 2
  ethernets:
    eth0:
      dhcp4: true
    eth1:
      dhcp4: true

write_files:
  - path: /tmp/configure-web.sh
    permissions: '0755'
    content: |
      #!/bin/bash -xe
      # Configuration script for jambonz Web server

      # Variables from Terraform
      MYSQL_HOST="${mysql_host}"
      MYSQL_PORT="${mysql_port}"
      MYSQL_USER="${mysql_user}"
      MYSQL_PASSWORD="${mysql_password}"
      MYSQL_DATABASE="${mysql_database}"
      REDIS_HOST="${redis_host}"
      REDIS_PORT="${redis_port}"
      JWT_SECRET="${jwt_secret}"
      URL_PORTAL="${url_portal}"
      VPC_CIDR="${vpc_cidr}"
      MONITORING_PRIVATE_IP="${monitoring_private_ip}"
      DEPLOY_RECORDING_CLUSTER="${deploy_recording_cluster}"

      echo "Starting jambonz Web server configuration for Exoscale"

      USER=jambonz
      HOME=/home/jambonz

      # Get instance metadata
      echo "Getting instance metadata..."
      PRIVATE_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' || echo "172.20.0.1")
      INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || hostname)
      PUBLIC_IP=$(curl -s https://api.ipify.org)

      echo "Public IP: $PUBLIC_IP"
      echo "Private IP: $PRIVATE_IP (eth1)"
      echo "Instance ID: $INSTANCE_ID"

      # Wait for database to be ready
      echo "Waiting for MySQL to be ready..."
      until mysql -h $MYSQL_HOST --port=$MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD -e "SELECT 1" &>/dev/null; do
        echo "MySQL not ready, waiting..."
        sleep 5
      done

      echo "Seeding database..."
      DEFAULT_ACCOUNT_SID=$(uuidgen)
      DEFAULT_TOKEN=$(uuidgen)

      # Exoscale DBaaS MySQL requires primary keys on all tables and uses
      # ANSI_QUOTES SQL mode (double quotes = identifiers). Fix both for import.
      MYSQL_OPTS="-h $MYSQL_HOST --port=$MYSQL_PORT -u $MYSQL_USER -D $MYSQL_DATABASE -p$MYSQL_PASSWORD"
      SQL_PREAMBLE="SET SESSION sql_require_primary_key = 0; SET SESSION sql_mode = 'NO_ENGINE_SUBSTITUTION';"

      # Seed database
      cd $HOME/apps/api-server/db
      sed -i "s/9351f46a-678c-43f5-b8a6-d4eb58d131af/$DEFAULT_ACCOUNT_SID/g" seed-production-database-open-source.sql
      sed -i "s/38700987-c7a4-4685-a5bb-af378f9734de/$DEFAULT_TOKEN/g" seed-production-database-open-source.sql
      echo "$SQL_PREAMBLE" | cat - jambones-sql.sql | mysql $MYSQL_OPTS || true
      sed -i "s/public-apps.jambonz.cloud/public-apps.$URL_PORTAL/g" seed-production-database-open-source.sql
      echo "$SQL_PREAMBLE" | cat - seed-production-database-open-source.sql | mysql $MYSQL_OPTS || true

      # Reset admin password
      JAMBONES_ADMIN_INITIAL_PASSWORD=$INSTANCE_ID \
      JAMBONES_MYSQL_HOST=$MYSQL_HOST \
      JAMBONES_MYSQL_PORT=$MYSQL_PORT \
      JAMBONES_MYSQL_USER=$MYSQL_USER \
      JAMBONES_MYSQL_PASSWORD=$MYSQL_PASSWORD \
      JAMBONES_MYSQL_DATABASE=$MYSQL_DATABASE \
      $HOME/apps/api-server/db/reset_admin_password.js || true

      # Add system information
      mysql $MYSQL_OPTS -e "INSERT INTO system_information (domain_name, sip_domain_name, monitoring_domain_name) VALUES ('$URL_PORTAL', 'sip.$URL_PORTAL', 'grafana.$URL_PORTAL')" || true

      # Configure webapp
      echo "Configuring webapp..."
      echo "VITE_API_BASE_URL=http://$URL_PORTAL/api/v1" > $HOME/apps/webapp/.env
      API_BASE_URL="http://$URL_PORTAL/api/v1"
      TAG="<script>window.JAMBONZ = { API_BASE_URL: '$API_BASE_URL'};</script>"
      sed -i "\\@</head>@i\\ $TAG" $HOME/apps/webapp/dist/index.html || true

      # Write PM2 ecosystem config
      echo "Writing ecosystem.config.js..."
      cat << 'EOFECO' > $HOME/apps/ecosystem.config.js
      module.exports = {
        apps : [
        {
          name: 'api-server',
          cwd: '/home/jambonz/apps/api-server',
          script: 'app.js',
          out_file: '/home/jambonz/.pm2/logs/api-server.log',
          err_file: '/home/jambonz/.pm2/logs/api-server.log',
          combine_logs: true,
          instance_var: 'INSTANCE_ID',
          exec_mode: 'cluster',
          instances: 0,
          autorestart: true,
          watch: false,
          max_memory_restart: '2G',
          env: {
            JAMBONES_LOGLEVEL: 'info',
            JWT_SECRET: 'JWT_SECRET_PLACEHOLDER',
            AUTHENTICATION_KEY: 'JWT_SECRET_PLACEHOLDER',
            JAMBONES_MYSQL_HOST: 'MYSQL_HOST_PORT_PLACEHOLDER',
            JAMBONES_MYSQL_USER: 'MYSQL_USER_PLACEHOLDER',
            JAMBONES_MYSQL_PASSWORD: 'MYSQL_PASSWORD_PLACEHOLDER',
            JAMBONES_MYSQL_DATABASE: 'MYSQL_DATABASE_PLACEHOLDER',
            JAMBONES_MYSQL_CONNECTION_LIMIT: 10,
            JAMBONES_REDIS_HOST: 'REDIS_HOST_PLACEHOLDER',
            JAMBONES_REDIS_PORT: REDIS_PORT_PLACEHOLDER,
            JAMBONE_API_VERSION: 'v1',
            JAMBONES_TIME_SERIES_HOST: 'MONITORING_IP_PLACEHOLDER',
            ENABLE_METRICS: 1,
            STATS_HOST: '127.0.0.1',
            STATS_PORT: 8125,
            STATS_PROTOCOL: 'tcp',
            STATS_TELEGRAF: 1,
            STATS_SAMPLE_RATE: 1,
            HTTP_PORT: 3000,
            JAEGER_BASE_URL: 'http://MONITORING_IP_PLACEHOLDER:16686',
            HOMER_BASE_URL: 'http://MONITORING_IP_PLACEHOLDER:9080',
            HOMER_USERNAME: 'admin',
            HOMER_PASSWORD: 'sipcapture',
            GRAFANA_BASE_URL: 'http://MONITORING_IP_PLACEHOLDER:3010',
            JAMBONZ_RECORD_WS_USERNAME: 'jambonz',
            JAMBONZ_RECORD_WS_PASSWORD: 'JWT_SECRET_PLACEHOLDER',
          }
        },
        {
          name: 'webapp',
          script: 'npm',
          cwd: '/home/jambonz/apps/webapp',
          args: 'run serve'
        },
        {
          name: 'public-apps',
          cwd: '/home/jambonz/apps/public-apps',
          script: 'app.js',
          out_file: '/home/jambonz/.pm2/logs/public-apps',
          err_file: '/home/jambonz/.pm2/logs/public-apps',
          combine_logs: true,
          instance_var: 'INSTANCE_ID',
          exec_mode: 'fork',
          instances: 1,
          autorestart: true,
          watch: false,
          max_memory_restart: '1G',
          env: {
            LOGLEVEL: 'info',
            HTTP_PORT: 3011,
            NRC_TIME_SERVICE_DID: '+16137451576'
          }
        }]
      };
      EOFECO

      # Replace placeholders
      sed -i "s/JWT_SECRET_PLACEHOLDER/$JWT_SECRET/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MYSQL_HOST_PORT_PLACEHOLDER/$MYSQL_HOST:$MYSQL_PORT/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MYSQL_USER_PLACEHOLDER/$MYSQL_USER/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MYSQL_PASSWORD_PLACEHOLDER/$MYSQL_PASSWORD/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MYSQL_DATABASE_PLACEHOLDER/$MYSQL_DATABASE/g" $HOME/apps/ecosystem.config.js
      sed -i "s/REDIS_HOST_PLACEHOLDER/$REDIS_HOST/g" $HOME/apps/ecosystem.config.js
      sed -i "s/REDIS_PORT_PLACEHOLDER/$REDIS_PORT/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MONITORING_IP_PLACEHOLDER/$MONITORING_PRIVATE_IP/g" $HOME/apps/ecosystem.config.js

      # Configure nginx (proxy grafana/homer to monitoring server)
      echo "Configuring nginx..."
      sudo cat << EOF > /etc/nginx/sites-available/default
      server {
          listen 80;
          server_name $URL_PORTAL;
          location /api/ {
              rewrite ^/api/(.*)$ /\$1 break;
              proxy_pass http://127.0.0.1:3000;
              proxy_set_header Host \$host;
          }
          location / {
              proxy_pass http://127.0.0.1:3001;
              proxy_set_header Host \$host;
          }
      }
      server {
          listen 80;
          server_name api.$URL_PORTAL;
          location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_set_header Host \$host;
          }
      }
      server {
        listen 80;
        server_name grafana.$URL_PORTAL;
        location / {
          proxy_pass http://$MONITORING_PRIVATE_IP:3010;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host \$host;
          proxy_cache_bypass \$http_upgrade;
        }
      }
      server {
        listen 80;
        server_name homer.$URL_PORTAL;
        location / {
          proxy_pass http://$MONITORING_PRIVATE_IP:9080;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host \$host;
          proxy_cache_bypass \$http_upgrade;
        }
      }
      server {
        listen 80;
        server_name public-apps.$URL_PORTAL;
        location / {
          proxy_pass http://127.0.0.1:3011;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host \$host;
          proxy_cache_bypass \$http_upgrade;
        }
      }
      EOF

      sudo systemctl restart nginx

      # Start PM2 apps
      su - $USER -c "pm2 delete all || true"
      su - $USER -c "pm2 start $HOME/apps/ecosystem.config.js"
      su - $USER -c "pm2 save"

      # Configure telegraf to send to the monitoring server
      sudo sed -i -e "s/influxdb:8086/$MONITORING_PRIVATE_IP:8086/g" /etc/telegraf/telegraf.conf
      sudo systemctl restart telegraf

      echo "Web server configuration complete!"

runcmd:
  - /tmp/configure-web.sh

final_message: "Jambonz Web server is ready!"
