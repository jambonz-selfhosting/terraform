#cloud-config
# Cloud-init for Jambonz SIP Server on Exoscale (Large deployment)
# Handles Drachtio and SIP-related applications only (no RTPEngine)

# Merge SSH keys into existing jambonz user
users:
  - name: jambonz
    ssh_authorized_keys:
      - "${ssh_public_key}"

write_files:
  - path: /tmp/configure-sip.sh
    permissions: '0755'
    content: |
      #!/bin/bash -xe
      # Configuration script for jambonz SIP server

      # Variables from Terraform
      MYSQL_HOST="${mysql_host}"
      MYSQL_PORT="${mysql_port}"
      MYSQL_USER="${mysql_user}"
      MYSQL_PASSWORD="${mysql_password}"
      MYSQL_DATABASE="${mysql_database}"
      REDIS_HOST="${redis_host}"
      REDIS_PORT="${redis_port}"
      JWT_SECRET="${jwt_secret}"
      URL_PORTAL="${url_portal}"
      VPC_CIDR="${vpc_cidr}"
      SIP_INDEX="${sip_index}"
      MONITORING_PRIVATE_IP="${monitoring_private_ip}"
      ENABLE_PCAPS="${enable_pcaps}"
      RTP_PRIVATE_IPS="${rtp_private_ips}"

      echo "Starting jambonz SIP-$SIP_INDEX server configuration for Exoscale"

      # Stop services immediately — they were auto-started at boot before eth1 is up
      # and before configuration is written. We restart each one later in this script
      # after eth1 is up and the config has been applied.
      sudo systemctl stop telegraf || true
      sudo systemctl stop drachtio || true

      USER=jambonz
      HOME=/home/jambonz

      # Bring up private network interface
      # The cloud-init network: stanza is overridden by the Exoscale datasource,
      # so we must bring up eth1 explicitly via DHCP.
      # Wait for the device to appear (udev may not have registered it yet at runcmd time).
      echo "Bringing up private network interface (eth1)..."
      for i in $(seq 1 30); do
        if ip link show eth1 &>/dev/null; then
          sudo dhclient eth1 && break
        fi
        echo "Waiting for eth1 to appear (attempt $i)..."
        sleep 2
      done

      # Get instance metadata
      echo "Getting instance metadata..."
      PRIVATE_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' || echo "172.20.0.1")
      INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || hostname)
      PUBLIC_IP=$(curl -s https://api.ipify.org)

      echo "Public IP: $PUBLIC_IP"
      echo "Private IP: $PRIVATE_IP (eth1)"
      echo "Instance ID: $INSTANCE_ID"
      echo "RTP Private IPs: $RTP_PRIVATE_IPS"

      # Build RTP engines connection string (IP:port format)
      RTPENGINES=""
      IFS=',' read -ra RTP_IPS <<< "$RTP_PRIVATE_IPS"
      for i in "$${!RTP_IPS[@]}"; do
          IP="$(echo "$${RTP_IPS[$i]}" | tr -d ' ')"
          if [ -n "$IP" ]; then
              if [ -n "$RTPENGINES" ]; then
                  RTPENGINES="$RTPENGINES,$IP:22222"
              else
                  RTPENGINES="$IP:22222"
              fi
          fi
      done

      echo "RTPEngines connection string: $RTPENGINES"

      # Wait for Redis to be ready
      echo "Waiting for Redis to be ready..."
      until redis-cli -h $REDIS_HOST -p $REDIS_PORT PING &>/dev/null; do
        echo "Redis not ready, waiting..."
        sleep 5
      done

      # Configure drachtio service
      echo "Configuring drachtio..."
      sudo sed -i -e "s/JAMBONES_MYSQL_HOST=/JAMBONES_MYSQL_HOST=$MYSQL_HOST/g" /etc/systemd/system/drachtio.service
      sudo sed -i -e "s/JAMBONES_MYSQL_PORT=/JAMBONES_MYSQL_PORT=$MYSQL_PORT/g" /etc/systemd/system/drachtio.service
      sudo sed -i -e "s/JAMBONES_MYSQL_USER=/JAMBONES_MYSQL_USER=$MYSQL_USER/g" /etc/systemd/system/drachtio.service
      sudo sed -i -e "s/JAMBONES_MYSQL_PASSWORD=/JAMBONES_MYSQL_PASSWORD=$MYSQL_PASSWORD/g" /etc/systemd/system/drachtio.service
      sudo sed -i -e "s/JAMBONES_MYSQL_DATABASE=/JAMBONES_MYSQL_DATABASE=$MYSQL_DATABASE/g" /etc/systemd/system/drachtio.service
      sudo sed -i -e "s/JAMBONES_REDIS_HOST=/JAMBONES_REDIS_HOST=$REDIS_HOST/g" /etc/systemd/system/drachtio.service
      sudo sed -i -e "s/JAMBONES_REDIS_PORT=/JAMBONES_REDIS_PORT=$REDIS_PORT/g" /etc/systemd/system/drachtio.service

      # Point drachtio to the HEP endpoint on the monitoring server
      if [[ "$ENABLE_PCAPS" == "true" ]]; then
        echo "Enabling PCAPs"
        sudo sed -i -e "s/--address 0.0.0.0 --port 9022/--address 0.0.0.0 --port 9022 --homer $MONITORING_PRIVATE_IP:9060 --homer-id 10/g" /etc/systemd/system/drachtio.service
      fi
      sudo sed -i "s/--homer 127.0.0.1:9060/--homer $MONITORING_PRIVATE_IP:9060/g" /etc/systemd/system/drachtio.service

      systemctl daemon-reload
      systemctl restart drachtio

      # Write PM2 ecosystem config for SIP server
      echo "Writing ecosystem.config.js for SIP server..."
      cat << 'EOFECO' > $HOME/apps/ecosystem.config.js
      module.exports = {
        apps : [
        {
          name: 'sbc-sip-sidecar',
          cwd: '/home/jambonz/apps/sbc-sip-sidecar',
          script: 'app.js',
          out_file: '/home/jambonz/.pm2/logs/sbc-sip-sidecar.log',
          err_file: '/home/jambonz/.pm2/logs/sbc-sip-sidecar.log',
          combine_logs: true,
          autorestart: true,
          watch: false,
          max_memory_restart: '2G',
          env: {
            JAMBONES_LOGLEVEL: 'info',
            JWT_SECRET: 'JWT_SECRET_PLACEHOLDER',
            RTPENGINE_PING_INTERVAL: 30000,
            DRACHTIO_HOST: '127.0.0.1',
            DRACHTIO_PORT: 9022,
            DRACHTIO_SECRET: 'cymru',
            JAMBONES_MYSQL_HOST: 'MYSQL_HOST_PORT_PLACEHOLDER',
            JAMBONES_MYSQL_USER: 'MYSQL_USER_PLACEHOLDER',
            JAMBONES_MYSQL_PASSWORD: 'MYSQL_PASSWORD_PLACEHOLDER',
            JAMBONES_MYSQL_DATABASE: 'MYSQL_DATABASE_PLACEHOLDER',
            JAMBONES_MYSQL_CONNECTION_LIMIT: 10,
            JAMBONES_REDIS_HOST: 'REDIS_HOST_PLACEHOLDER',
            JAMBONES_REDIS_PORT: REDIS_PORT_PLACEHOLDER,
            JAMBONES_TIME_SERIES_HOST: 'MONITORING_IP_PLACEHOLDER',
            ENABLE_METRICS: 1,
            STATS_HOST: '127.0.0.1',
            STATS_PORT: 8125,
            STATS_PROTOCOL: 'tcp',
            STATS_TELEGRAF: 1,
            STATS_SAMPLE_RATE: 1,
            JAMBONES_NETWORK_CIDR: 'VPC_CIDR_PLACEHOLDER',
            JAMBONES_SBC_SIP_INTERFACE: 'PRIVATE_IP_PLACEHOLDER'
          }
        },
        {
          name: 'sbc-call-router',
          cwd: '/home/jambonz/apps/sbc-call-router',
          script: 'app.js',
          out_file: '/home/jambonz/.pm2/logs/sbc-call-router.log',
          err_file: '/home/jambonz/.pm2/logs/sbc-call-router.log',
          combine_logs: true,
          autorestart: true,
          watch: false,
          max_memory_restart: '1G',
          env: {
            JAMBONES_LOGLEVEL: 'info',
            HTTP_PORT: 4000,
            JAMBONES_INBOUND_ROUTE: '127.0.0.1:4002',
            JAMBONES_OUTBOUND_ROUTE: '127.0.0.1:4003',
            JAMBONZ_TAGGED_INBOUND: 1,
            ENABLE_METRICS: 1,
            STATS_HOST: '127.0.0.1',
            STATS_PORT: 8125,
            STATS_PROTOCOL: 'tcp',
            STATS_TELEGRAF: 1,
            STATS_SAMPLE_RATE: 1,
            JAMBONES_NETWORK_CIDR: 'VPC_CIDR_PLACEHOLDER'
          }
        },
        {
          name: 'outbound',
          cwd: '/home/jambonz/apps/outbound',
          script: 'app.js',
          out_file: '/home/jambonz/.pm2/logs/outbound.log',
          err_file: '/home/jambonz/.pm2/logs/outbound.log',
          combine_logs: true,
          autorestart: true,
          watch: false,
          max_memory_restart: '3G',
          env: {
            JAMBONES_LOGLEVEL: 'info',
            JWT_SECRET: 'JWT_SECRET_PLACEHOLDER',
            JAMBONES_NETWORK_CIDR: 'VPC_CIDR_PLACEHOLDER',
            JAMBONES_RTPENGINE_INJECT_DTMF_ALWAYS: 0,
            JAMBONES_RTPENGINE_UDP_PORT: 6000,
            JAMBONES_RTPENGINES: 'RTPENGINES_PLACEHOLDER',
            MIN_CALL_LIMIT: 9999,
            RTPENGINE_PING_INTERVAL: 30000,
            DRACHTIO_HOST: '127.0.0.1',
            DRACHTIO_PORT: 9022,
            DRACHTIO_SECRET: 'cymru',
            JAMBONES_MYSQL_HOST: 'MYSQL_HOST_PORT_PLACEHOLDER',
            JAMBONES_MYSQL_USER: 'MYSQL_USER_PLACEHOLDER',
            JAMBONES_MYSQL_PASSWORD: 'MYSQL_PASSWORD_PLACEHOLDER',
            JAMBONES_MYSQL_DATABASE: 'MYSQL_DATABASE_PLACEHOLDER',
            JAMBONES_MYSQL_CONNECTION_LIMIT: 10,
            JAMBONES_REDIS_HOST: 'REDIS_HOST_PLACEHOLDER',
            JAMBONES_REDIS_PORT: REDIS_PORT_PLACEHOLDER,
            JAMBONES_TIME_SERIES_HOST: 'MONITORING_IP_PLACEHOLDER',
            JAMBONES_TRACK_ACCOUNT_CALLS: 0,
            JAMBONES_TRACK_SP_CALLS: 0,
            JAMBONES_TRACK_APP_CALLS: 0,
            ENABLE_METRICS: 1,
            STATS_HOST: '127.0.0.1',
            STATS_PORT: 8125,
            STATS_PROTOCOL: 'tcp',
            STATS_SAMPLE_RATE: 1,
            STATS_TELEGRAF: 1
          }
        },
        {
          name: 'inbound',
          cwd: '/home/jambonz/apps/inbound',
          script: 'app.js',
          out_file: '/home/jambonz/.pm2/logs/inbound.log',
          err_file: '/home/jambonz/.pm2/logs/inbound.log',
          combine_logs: true,
          autorestart: true,
          watch: false,
          max_memory_restart: '3G',
          env: {
            JAMBONES_LOGLEVEL: 'info',
            JWT_SECRET: 'JWT_SECRET_PLACEHOLDER',
            JAMBONES_NETWORK_CIDR: 'VPC_CIDR_PLACEHOLDER',
            JAMBONES_RTPENGINE_INJECT_DTMF_ALWAYS: 0,
            JAMBONES_RTPENGINE_UDP_PORT: 7000,
            JAMBONES_RTPENGINES: 'RTPENGINES_PLACEHOLDER',
            DRACHTIO_HOST: '127.0.0.1',
            DRACHTIO_PORT: 9022,
            DRACHTIO_SECRET: 'cymru',
            HTTP_PORT: 3000,
            HTTP_PORT_MAX: 3009,
            JAMBONES_MYSQL_HOST: 'MYSQL_HOST_PORT_PLACEHOLDER',
            JAMBONES_MYSQL_USER: 'MYSQL_USER_PLACEHOLDER',
            JAMBONES_MYSQL_PASSWORD: 'MYSQL_PASSWORD_PLACEHOLDER',
            JAMBONES_MYSQL_DATABASE: 'MYSQL_DATABASE_PLACEHOLDER',
            JAMBONES_MYSQL_CONNECTION_LIMIT: 10,
            JAMBONES_REDIS_HOST: 'REDIS_HOST_PLACEHOLDER',
            JAMBONES_REDIS_PORT: REDIS_PORT_PLACEHOLDER,
            JAMBONES_TIME_SERIES_HOST: 'MONITORING_IP_PLACEHOLDER',
            ENABLE_METRICS: 1,
            JAMBONES_TRACK_ACCOUNT_CALLS: 0,
            JAMBONES_TRACK_SP_CALLS: 0,
            JAMBONES_TRACK_APP_CALLS: 0,
            STATS_HOST: '127.0.0.1',
            STATS_PORT: 8125,
            STATS_PROTOCOL: 'tcp',
            STATS_TELEGRAF: 1,
            STATS_SAMPLE_RATE: 1,
            MS_TEAMS_SIP_PROXY_IPS: '52.114.148.0, 52.114.132.46, 52.114.75.24, 52.114.76.76, 52.114.7.24, 52.114.14.70'
          }
        }]
      };
      EOFECO

      # Replace placeholders
      sed -i "s/JWT_SECRET_PLACEHOLDER/$JWT_SECRET/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MYSQL_HOST_PORT_PLACEHOLDER/$MYSQL_HOST:$MYSQL_PORT/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MYSQL_USER_PLACEHOLDER/$MYSQL_USER/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MYSQL_PASSWORD_PLACEHOLDER/$MYSQL_PASSWORD/g" $HOME/apps/ecosystem.config.js
      sed -i "s/MYSQL_DATABASE_PLACEHOLDER/$MYSQL_DATABASE/g" $HOME/apps/ecosystem.config.js
      sed -i "s/REDIS_HOST_PLACEHOLDER/$REDIS_HOST/g" $HOME/apps/ecosystem.config.js
      sed -i "s/REDIS_PORT_PLACEHOLDER/$REDIS_PORT/g" $HOME/apps/ecosystem.config.js
      sed -i "s|VPC_CIDR_PLACEHOLDER|$VPC_CIDR|g" $HOME/apps/ecosystem.config.js
      sed -i "s/PRIVATE_IP_PLACEHOLDER/$PRIVATE_IP/g" $HOME/apps/ecosystem.config.js
      sed -i "s|RTPENGINES_PLACEHOLDER|$RTPENGINES|g" $HOME/apps/ecosystem.config.js
      sed -i "s/MONITORING_IP_PLACEHOLDER/$MONITORING_PRIVATE_IP/g" $HOME/apps/ecosystem.config.js

      # Configure telegraf to send to the monitoring server
      sudo sed -i -e "s/influxdb:8086/$MONITORING_PRIVATE_IP:8086/g" /etc/telegraf/telegraf.conf

      # Wait for InfluxDB to be ready on the monitoring server
      echo "Waiting for InfluxDB at $MONITORING_PRIVATE_IP:8086..."
      for i in $(seq 1 60); do
          if curl -sf http://$MONITORING_PRIVATE_IP:8086/ping &>/dev/null; then
              echo "InfluxDB is available"
              break
          fi
          echo "InfluxDB not yet available, attempt $i/60..."
          sleep 10
      done
      sudo systemctl restart telegraf

      # Start PM2 apps
      su - $USER -c "pm2 delete all || true"
      su - $USER -c "pm2 start $HOME/apps/ecosystem.config.js"
      su - $USER -c "pm2 save"

      # Configure APIBan
      APIBAN_KEY="${apiban_key}"
      APIBAN_CLIENT_ID="${apiban_client_id}"
      APIBAN_CLIENT_SECRET="${apiban_client_secret}"

      if [ -n "$APIBAN_CLIENT_ID" ] && [ -n "$APIBAN_CLIENT_SECRET" ]; then
          echo "Provisioning APIBan key via client credentials..."
          APIBANKEY=$(curl -X POST -u "$APIBAN_CLIENT_ID:$APIBAN_CLIENT_SECRET" \
              -d "{\"client\": \"$INSTANCE_ID\"}" \
              -s https://apiban.org/sponsor/newkey | jq -r '.ApiKey' 2>/dev/null || echo "")
          if [ -n "$APIBANKEY" ] && [ "$APIBANKEY" != "null" ] && [ -f /usr/local/bin/apiban/config.json ]; then
              sudo sed -i -e "s/API-KEY-HERE/$APIBANKEY/g" /usr/local/bin/apiban/config.json
              sudo /usr/local/bin/apiban/apiban-client-nftables FULL || true
          else
              echo "Failed to provision APIBan key via client credentials"
          fi
      elif [ -n "$APIBAN_KEY" ] && [ -f /usr/local/bin/apiban/config.json ]; then
          echo "Configuring APIBan with provided key..."
          sudo sed -i -e "s/API-KEY-HERE/$APIBAN_KEY/g" /usr/local/bin/apiban/config.json
          sudo /usr/local/bin/apiban/apiban-client-nftables FULL || true
      else
          echo "Skipping APIBan configuration (no credentials provided)"
      fi

      echo "SIP-$SIP_INDEX server configuration complete!"

runcmd:
  - /tmp/configure-sip.sh

final_message: "Jambonz SIP server is ready!"
